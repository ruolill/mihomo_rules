#这里是订阅更新和延迟测试相关
PProviders: &PProviders 
  type: http
  interval: 86400
  proxy: 订阅更新 #可以更改 proxy 指定的出站
  header: 
    User-Agent: ["Clash.Meta/mihomo/Alpha/1.19.19/ClashforWindows/0.19.23"]
  health-check: 
    enable: true
    url: 'https://connectivitycheck.platform.hicloud.com/generate_204'
    interval: 3600 # 健康检查间隔，单位秒
    timeout: 1500 # 节点超时限制，单位毫秒
  filter: '(?i)^(?!.*(?:官网|网址|选择|群组|剩余|公益|发布|DIZTNA|通路|备用|登录|禁止|定时|渠道|更新|过期|牢记|永久|到期|进群|余额|关注|阁下|本站|无法|刷新|导航|⚠️|@|Expire|http|https|com|g)).*'
#----------------------------------------------
#引用远程订阅链接或者本地文件
# url里填写自己的订阅,名称不能重复
proxy-providers:    
  机场一: # 修改名称请同步修改下方两处
    <<: *PProviders
    url: "订阅链接"
    path: ./proxy_providers/机场一.yaml
    override: {additional-suffix: '[机场一]'} 
    
  机场二:
    <<: *PProviders
    url: "订阅链接"
    path: ./proxy_providers/机场二.yaml
    override: {additional-suffix: '[机场二]'}
  
    # override: {additional-prefix: '[]'}
   # []内可为节点名称添加固定前缀
   
   # override: {additional-suffix: '[]'}
   # []内可为节点名称添加固定后缀
#-----------------------------------------------
proxies:
  - {name: DNS_Hijack, type: dns}
#-----------------------------------------------
# 基础配置
mixed-port: 7890
redir-port: 9797
tproxy-port: 9898
mode: rule           # 运行模式
bind-address: '*'
ipv6: true          # IPv6总开关
allow-lan: true       # 允许局域网
unified-delay: false  # 统一延迟
tcp-concurrent: true # TCP并发
log-level: error      # 日志等级 silent/error/warning/info/debug
find-process-mode: strict
#  - always, 开启，强制匹配所有进程
#  - strict, 默认，由 mihomo 判断是否开启
#  - off, 不匹配进程，推荐在路由器上使用此模式
keep-alive-interval: 15 #默认15

keep-alive-idle: 15

#-----------------------------------------------
# 管理面板配置
external-controller: 0.0.0.0:9090
external-ui: ./dashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
#-----------------------------------------------
# 配置存储
profile: # 存储 select 选择记录
  store-selected: true
  # 持久化 fake-ip
  store-fake-ip: true
#-----------------------------------------------
# 嗅探模块
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"
#-----------------------------------------------
# 网卡模块
tun:
  enable: false  # true 开 # false 默认关
  device: meta
  stack: gvisor
  dns-hijack:
    - any:53
    - tcp://any:53
  udp-timeout: 300
  auto-route: true
  strict-route: true
  auto-redirect: false
  auto-detect-interface: true
  exclude-package:
#-----------------------------------------------
# DNS模块
dns:
  enable: true
  prefer-h3: false
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "RULE-SET:Fake-IP-Filter"
    - "RULE-SET:直连名单"
  default-nameserver:
    - 119.29.29.29
    - 223.6.6.6
  direct-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver-follow-policy: true
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://dns.google/dns-query#DNS
    - https://dns.cloudflare.com/dns-query#DNS
  nameserver-policy:
    "RULE-SET:cn_add,cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
#-----------------------------------------------
# 锚点 - 地区筛选组
FilterHK: &FilterHK '(?i)^(?!.*(?:us)).*(港|hk|🇭🇰|hongkong|hong kong)' 

FilterSG: &FilterSG '(?i)^(?!.*(?:us)).*(新加坡|狮城|sg|🇸🇬|singapore)'

FilterJP: &FilterJP '(?i)日本|jp|🇯🇵|japan'

FilterUS: &FilterUS '(?i)美|us|🇺🇸|unitedstates|united states' 

# (?i)^(?!.*(?:排除)).*(保留)
# .*前面括号内加关键词为排除节点
# .*后面括号内加关键词为保留节点
#-----------------------------------------------
# 锚点 - 策略组基础配置
Select: &Select # 手动选择
  type: select
  include-all-providers: true #引入所有订阅
  interval: 3600
  timeout: 1500
  url: 'https://connectivitycheck.platform.hicloud.com/generate_204'

BaseUT: &BaseUT 
  type: url-test
  include-all-providers: true
  tolerance: 50 
  filter: '(?i)^(?!.*(?:2x|5x|home)).*' # 排除高倍率节点
#-----------------------------------------------
#锚点 - 策略组代理列表
SelectPy: &SelectPy 
  type: select
  interval: 600
  url: 'https://connectivitycheck.platform.hicloud.com/generate_204'
  proxies: [自动选择, 香港, 新加坡, 日本, 美国, 全部节点, DIRECT]

SelectProxy: &SelectProxy 
  type: select
  proxies: [代理, 香港, 新加坡, 日本, 美国, 全部节点, 自动选择, DIRECT]
#-----------------------------------------------
# 代理策略组
proxy-groups:
  #---------------------------------------------
  # 主要策略组
  - name: 代理
    <<: *SelectPy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Proxy.png"
  
  - name: Telegram
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Telegram.png"
  
  - name: Emby
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png"
    
  - name: Google
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/Google_Search.png"
    
  - name: YouTube
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/icon/qure/color/YouTube.png"
    
  - name: Ai平台
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Qure.png"
    
  - name: GitHub
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/github_00.png"
  #---------------------------------------------
  #地区策略组                              
  - name: 香港
    <<: *Select
    filter: *FilterHK
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"
  
  - name: 新加坡
    <<: *Select
    filter: *FilterSG
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"
    
  - name: 日本
    <<: *Select
    filter: *FilterJP
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png"
    
  - name: 美国
    <<: *Select
    filter: *FilterUS
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png"
        
  - name: 全部节点
    <<: *Select
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"
  
  - name: 自动选择
    <<: *BaseUT
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  #---------------------------------------------
  # 其它策略组  
  - name: 订阅更新
    type: select
    proxies: [DIRECT, 代理]
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Airport.png"
    
  - name: DNS
    <<: *SelectProxy
    icon: "https://v6.gh-proxy.org/https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png"
#-----------------------------------------------
# 路由规则
rules:
  - IP-CIDR,95.161.76.100/31,REJECT-DROP,no-resolve
  - DST-PORT,53,DNS_Hijack
  #---------------------------------------------
  # 本地网络规则
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve 
  #---------------------------------------------
  # 分流规则
  - RULE-SET,直连名单,DIRECT
  - RULE-SET,googlefcm,DIRECT
  - DOMAIN-SUFFIX,micu.hk,DIRECT
  - RULE-SET,Emby,Emby
  - RULE-SET,Ai,Ai平台
  - RULE-SET,telegram,Telegram 
  - RULE-SET,telegram_ip,Telegram  
  - RULE-SET,github,GitHub
  - RULE-SET,youtube,YouTube
  - RULE-SET,google,Google     
  - RULE-SET,google_ip,Google 
  - RULE-SET,gfw,代理
  #---------------------------------------------
  # 中国大陆规则 
  - RULE-SET,cn_add,DIRECT
  - RULE-SET,cn,DIRECT 
  - RULE-SET,cn_ip,DIRECT
  #---------------------------------------------
  # 兜底规则 - 未匹配流量
  - MATCH,代理
#-----------------------------------------------
# 规则集锚点
rule-anchor:
  Local: &local {type: file, behavior: classical, format: text}
  
  dom: &dom {type: http, interval: 86400, behavior: domain, format: yaml}
  
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
#-----------------------------------------------
# 规则提供者
rule-providers:
  Emby: # 本地Emby名单
    <<: *local
    path: ./rule_local/Emby.list # 需手动创建文件并添加规则
  
  直连名单:
    <<: *local
    path: ./rule_local/直连名单.list # 需手动创建文件并添加规则
  
  Ai:  
    <<: *domain
    url: "https://v6.gh-proxy.org/https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/ai.mrs"
    path: ./rule_providers/Ai.mrs       
                       
  Fake-IP-Filter:
    <<: *domain
    url: "https://v6.gh-proxy.org/https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/fakeip-filter.mrs"  
    path: ./rule_providers/Fake-IP-Filter.mrs
    
  github:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/github.mrs"
    path: ./rule_providers/github.mrs
  
  googlefcm:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/googlefcm.mrs"
    path: ./rule_providers/googlefcm.mrs
  
  google:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google.mrs"
    path: ./rule_providers/google.mrs
    
  google_ip:
    <<: *ip
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/google.mrs"
    path: ./rule_providers/google_ip.mrs
  
  youtube:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/youtube.mrs"
    path: ./rule_providers/youtube.mrs
  
  telegram:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/telegram.mrs"
    path: ./rule_providers/telegram.mrs  
        
  telegram_ip:
    <<: *ip
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs"
    path: ./rule_providers/telegram_ip.mrs 

  gfw:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/DustinWin/ruleset_geodata/raw/refs/heads/mihomo-ruleset/gfw.mrs"
    path: ./rule_providers/gfw.mrs
  
  private:
    <<: *domain
    url: "https://v6.gh-proxy.org//https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/private.mrs"

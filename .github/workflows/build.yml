name: Build MRS Rules

on:
  push:
    paths:
      - "rules/text/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Mihomo
        run: |
          wget https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.zip
          unzip mihomo-linux-amd64.zip -d mihomo
          chmod +x mihomo/mihomo

      - name: Convert rules
        run: |
          mkdir -p rules/output
          for file in rules/text/*.txt; do
            name=$(basename "$file" .txt)
            ./mihomo/mihomo convert ruleset -i "$file" -o "rules/output/$name.mrs"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mrs-rules
          path: rules/output/*.mrs

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: rules/output/*.mrs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
